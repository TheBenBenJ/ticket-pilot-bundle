# See https://github.com/TheBenBenJ/ticket-pilot-bundle for the full reference
# (run `php bin/console config:dump-reference ticket_pilot`).
#
# Sources, the VCS provider and the quality gate are opt-in. Enable what you use
# and keep every secret in environment variables. Read SECURITY.md before
# pointing this at a repository that contains secrets.
ticket_pilot:
    default_source: github
    default_agent: claude

